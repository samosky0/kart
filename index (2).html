<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ad Soyad</title>
<meta name="theme-color" content="#0a0118">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0118;
    --magenta:#ff3fd8;
    --cyan:#00e5ff;
    --violet:#8b5cf6;
    --gold:#ffd166;
    --glass:rgba(255,255,255,.06);
    --glass-edge:rgba(255,255,255,.14);
    --text:#f5f0ff;
    --text-soft:rgba(245,240,255,.62);
    --whatsapp:#37e07a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--bg);
    font-family:'Inter', sans-serif;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:36px 18px;
    position:relative;
  }

  /* ---- ışıklı arka plan lekeleri ---- */
  .glow{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    opacity:.55;
    z-index:0;
    pointer-events:none;
  }
  .glow.g1{ width:340px; height:340px; background:var(--magenta); top:-8%; left:-12%; animation:float1 14s ease-in-out infinite; }
  .glow.g2{ width:300px; height:300px; background:var(--cyan); bottom:-10%; right:-10%; animation:float2 17s ease-in-out infinite; }
  .glow.g3{ width:220px; height:220px; background:var(--violet); top:38%; right:4%; animation:float3 12s ease-in-out infinite; }

  @keyframes float1{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(30px,40px) scale(1.15); }
  }
  @keyframes float2{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-25px,-35px) scale(1.1); }
  }
  @keyframes float3{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-20px,25px) scale(1.2); }
  }

  /* ---- dönen ışıltılı çerçeve ---- */
  .card-wrap{
    position:relative;
    width:100%;
    max-width:380px;
    z-index:1;
    border-radius:26px;
    padding:2px;
    background:conic-gradient(from var(--angle,0deg), var(--magenta), var(--violet), var(--cyan), var(--gold), var(--magenta));
    animation:spin 6s linear infinite;
    box-shadow:0 0 60px -10px rgba(139,92,246,.55), 0 0 100px -20px rgba(0,229,255,.35);
  }
  @property --angle{
    syntax:'<angle>';
    initial-value:0deg;
    inherits:false;
  }
  @keyframes spin{
    to{ --angle:360deg; }
  }

  .card{
    position:relative;
    background:rgba(14,8,32,.82);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:24px;
    padding:36px 26px 28px;
    border:1px solid var(--glass-edge);
    text-align:center;
  }

  .avatar{
    width:64px; height:64px;
    margin:0 auto 18px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--magenta), var(--violet) 55%, var(--cyan));
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:22px;
    color:#0a0118;
    box-shadow:0 0 0 4px rgba(255,255,255,.08), 0 0 30px rgba(139,92,246,.65);
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:.2em;
    text-transform:uppercase;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:0 0 10px;
    font-weight:500;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(26px, 7.5vw, 32px);
    line-height:1.1;
    margin:0 0 6px;
    background:linear-gradient(90deg, #ffffff, #d9c9ff 60%, #ffe3fb);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .unvan{
    font-size:14px;
    color:var(--text-soft);
    margin:0 0 26px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:24px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid var(--glass-edge);
    background:var(--glass);
    color:var(--text);
    text-decoration:none;
    font-weight:500;
    font-size:15px;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn svg{ width:20px; height:20px; flex-shrink:0; }
  .btn .arrow{ margin-left:auto; opacity:.4; width:16px; height:16px; }

  .btn.ig svg{ color:var(--magenta); }
  .btn.ig:hover{ box-shadow:0 0 24px -4px rgba(255,63,216,.55); background:rgba(255,63,216,.08); }

  .btn.wa svg{ color:var(--whatsapp); }
  .btn.wa:hover{ box-shadow:0 0 24px -4px rgba(55,224,122,.55); background:rgba(55,224,122,.08); }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:6px 0 14px;
    color:var(--text-soft);
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--glass-edge), transparent);
  }

  .iban-box{
    background:rgba(255,255,255,.04);
    border:1px solid var(--glass-edge);
    border-radius:16px;
    padding:18px 16px;
  }
  .iban-banka{
    font-size:12px;
    color:var(--text-soft);
    margin:0 0 8px;
  }
  .iban-num{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    letter-spacing:.03em;
    word-break:break-all;
    margin:0 0 16px;
    color:#fff;
  }
  .copy-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    background:linear-gradient(90deg, var(--magenta), var(--violet));
    color:#fff;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    padding:11px 20px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 4px 24px -6px rgba(139,92,246,.7);
    transition:transform .15s ease, box-shadow .2s ease, background .3s ease;
  }
  .copy-btn:active{ transform:scale(.96); }
  .copy-btn.copied{
    background:linear-gradient(90deg, var(--whatsapp), var(--cyan));
    box-shadow:0 4px 24px -6px rgba(55,224,122,.7);
  }
  .copy-btn svg{ width:14px; height:14px; }

  footer{
    text-align:center;
    margin-top:22px;
    font-size:11px;
    color:rgba(255,255,255,.28);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:.1em;
  }

  @media (prefers-reduced-motion: reduce){
    .glow, .card-wrap{ animation:none; }
  }
</style>
</head>
<body>

  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="avatar" id="avatar">AS</div>
      <p class="eyebrow">Dijital Kartvizit</p>
      <h1 id="adSoyad">Ad Soyad</h1>
      <p class="unvan" id="unvan">Buraya kısa bir açıklama</p>

      <div class="links">
        <a class="btn ig" id="igLink" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1"/></svg>
          Instagram'da takip et
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </a>
        <a class="btn wa" id="waLink" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.15c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.09.11-1.76-.11-.4-.13-.92-.3-1.58-.59-2.78-1.2-4.6-4.01-4.74-4.2-.14-.19-1.13-1.5-1.13-2.87s.71-2.04.96-2.32c.25-.28.55-.35.73-.35h.53c.17 0 .4-.06.62.48.24.57.8 1.98.87 2.12.07.14.11.31.02.5-.09.19-.14.31-.28.47-.14.16-.29.36-.42.48-.14.14-.28.29-.12.57.16.28.72 1.19 1.55 1.93 1.06.95 1.96 1.24 2.24 1.38.28.14.44.12.6-.07.16-.19.68-.79.87-1.06.19-.28.37-.23.62-.14.26.09 1.63.77 1.91.91.28.14.47.21.53.33.07.12.07.68-.17 1.36z"/></svg>
          WhatsApp'tan yaz
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </a>
      </div>

      <div class="divider">Ödeme bilgisi</div>

      <div class="iban-box">
        <p class="iban-banka" id="bankaAdi">Banka Adı</p>
        <p class="iban-num" id="ibanText">TR00 0000 0000 0000 0000 0000 00</p>
        <button class="copy-btn" id="copyBtn" onclick="copyIban()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          <span id="copyLabel">IBAN'ı kopyala</span>
        </button>
      </div>

      <footer id="yearFooter"></footer>
    </div>
  </div>

<script>
/* =========================================================
   BURAYI DÜZENLE — kendi bilgilerini yaz
   ========================================================= */
const bilgiler = {
  adSoyad: "Ad Soyad",
  unvan: "Buraya kısa bir açıklama",       // İstemiyorsan boş bırak: ""
  instagramKullanici: "kullaniciadi",       // Başında @ olmadan
  whatsappNumara: "905XXXXXXXXX",           // Başında 0 olmadan, ülke koduyla (90...)
  whatsappMesaj: "Merhaba, IBAN sayfanız üzerinden ulaşıyorum.",
  ibanNumara: "TR00 0000 0000 0000 0000 0000 00",
  bankaAdi: "Banka Adı"                     // İstemiyorsan boş bırak: ""
};
/* ========================================================= */

document.getElementById('adSoyad').textContent = bilgiler.adSoyad;
document.title = bilgiler.adSoyad;

// Avatar baş harfleri otomatik oluşturuluyor
const parcalar = bilgiler.adSoyad.trim().split(/\s+/);
const bashHarfler = ((parcalar[0]?.[0] || '') + (parcalar[1]?.[0] || '')).toUpperCase();
document.getElementById('avatar').textContent = bashHarfler || 'AS';

const unvanEl = document.getElementById('unvan');
if (bilgiler.unvan) { unvanEl.textContent = bilgiler.unvan; }
else { unvanEl.remove(); }

document.getElementById('igLink').href = "https://instagram.com/" + encodeURIComponent(bilgiler.instagramKullanici);

const waNumaraTemiz = bilgiler.whatsappNumara.replace(/\D/g, '');
document.getElementById('waLink').href = "https://wa.me/" + waNumaraTemiz + "?text=" + encodeURIComponent(bilgiler.whatsappMesaj);

const bankaEl = document.getElementById('bankaAdi');
if (bilgiler.bankaAdi) { bankaEl.textContent = bilgiler.bankaAdi; }
else { bankaEl.remove(); }

document.getElementById('ibanText').textContent = bilgiler.ibanNumara;

document.getElementById('yearFooter').textContent = new Date().getFullYear();

function copyIban(){
  const iban = bilgiler.ibanNumara.replace(/\s+/g, '');
  const btn = document.getElementById('copyBtn');
  const label = document.getElementById('copyLabel');

  const done = () => {
    btn.classList.add('copied');
    label.textContent = 'Kopyalandı';
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = "IBAN'ı kopyala";
    }, 1800);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(iban).then(done).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }

  function fallbackCopy(){
    const ta = document.createElement('textarea');
    ta.value = iban;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    done();
  }
}
</script>
</body>
</html>
